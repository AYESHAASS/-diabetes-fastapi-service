name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        uses: huggingface/github-action@v1
        with:
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_id: Ayeshaaaa17/diabetes-prediction-api
          repo_type: space
